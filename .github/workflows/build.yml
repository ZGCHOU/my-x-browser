name: Build Cross-Platform Packages

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        pip install pygetwindow
    
    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller CamoufoxManager.spec --clean --noconfirm
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CamoufoxManager-Windows
        path: dist/CamoufoxManager.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build with PyInstaller
      run: |
        pyinstaller CamoufoxManager.spec --clean --noconfirm
    
    - name: Create portable package
      run: |
        mkdir -p CamoufoxManager_Linux
        cp dist/CamoufoxManager CamoufoxManager_Linux/
        chmod +x CamoufoxManager_Linux/CamoufoxManager
        
        printf '%s\n' '#!/bin/bash' 'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"' 'cd "$SCRIPT_DIR"' './CamoufoxManager' > CamoufoxManager_Linux/启动.sh
        chmod +x CamoufoxManager_Linux/启动.sh
        
        tar -czf CamoufoxManager_Linux.tar.gz CamoufoxManager_Linux/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CamoufoxManager-Linux
        path: CamoufoxManager_Linux.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build with PyInstaller
      run: |
        pyinstaller CamoufoxManager.spec --clean --noconfirm
    
    - name: Create macOS app bundle
      run: |
        mkdir -p "CamoufoxManager.app/Contents/MacOS"
        mkdir -p "CamoufoxManager.app/Contents/Resources"
        cp dist/CamoufoxManager "CamoufoxManager.app/Contents/MacOS/"
        chmod +x "CamoufoxManager.app/Contents/MacOS/CamoufoxManager"
        
        echo '<?xml version="1.0" encoding="UTF-8"?>' > "CamoufoxManager.app/Contents/Info.plist"
        echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '<plist version="1.0">' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '<dict>' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '    <key>CFBundleExecutable</key>' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '    <string>CamoufoxManager</string>' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '    <key>CFBundleIdentifier</key>' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '    <string>com.camoufox.manager</string>' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '    <key>CFBundleName</key>' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '    <string>Camoufox Manager</string>' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '    <key>CFBundlePackageType</key>' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '    <string>APPL</string>' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '    <key>CFBundleShortVersionString</key>' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '    <string>1.0.0</string>' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '</dict>' >> "CamoufoxManager.app/Contents/Info.plist"
        echo '</plist>' >> "CamoufoxManager.app/Contents/Info.plist"
        
        tar -czf CamoufoxManager_macOS.tar.gz CamoufoxManager.app
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CamoufoxManager-macOS
        path: |
          dist/CamoufoxManager
          CamoufoxManager_macOS.tar.gz
